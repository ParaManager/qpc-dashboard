<!doctype html>
<html lang="ar" dir="auto" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Prevent automatic browser/OS translation: this is a dynamic React app, and
         translation engines can mangle short JS-rendered labels (e.g. status badges)
         since they aren't part of the static HTML at page-load time. -->
    <meta name="google" content="notranslate" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0085C7" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QPC" />

    <!-- iOS icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <!-- App meta -->
    <meta name="description" content="Qatar Paralympic Committee Admin Dashboard - لوحة تحكم الاتحاد القطري لذوي الاحتياجات الخاصة" />
    <meta name="application-name" content="QPC Dashboard" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <title>QPC Dashboard</title>

    <!-- Inline, zero-dependency styling for the very first paint — this has to
         work before the real stylesheet (bundled by Vite) has even downloaded,
         which is exactly the gap that caused a black-then-white flash before the
         app's real background color ever took effect, especially on slower
         mobile connections. -->
    <style>
      html, body { background: #f4f5f7; margin: 0; }
      #initial-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px; background: #f4f5f7; z-index: 9999;
      }
      #initial-loader .dots { display: flex; gap: 6px; }
      #initial-loader .dot { width: 14px; height: 14px; border-radius: 50%; animation: initial-pulse 1s ease-in-out infinite; }
      #initial-loader .dot:nth-child(1) { background: #EE334E; animation-delay: 0s; }
      #initial-loader .dot:nth-child(2) { background: #0085C7; animation-delay: .15s; }
      #initial-loader .dot:nth-child(3) { background: #009F6B; animation-delay: .3s; }
      @keyframes initial-pulse { 0%, 100% { opacity: .3; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }
      /* Hidden once React has mounted and taken over rendering (see main.jsx). */
      #root:not(:empty) + #initial-loader { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="initial-loader"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW error:', err))
        })
      }
    </script>
  </body>
</html>
